# Regret matching as the policy PARAMETRIZATION (rm).
#
# The network's categorical head is read as a regret vector z and the actor IS the
# regret-matching map π = [z]₊ / Σ[z]₊ (instantaneous regrets, PG through the L1
# map). Last-iterate convergence comes from the weight-space magnet KL
# (magnet_coef) + proximal term (old_policy_coef), as in MMD.
#
# NOTE: `alpha` does not apply here — loss_type=rm forces its own RM transform
# internally for rollout, eval and loss, so any alpha set below is ignored.
#
# CAVEAT: the RM map is flat where z ≤ 0, so a regret that goes negative gets no
# gradient to recover (dead units). The paper mitigates this with large/positive
# init of the regret vector; if you see the policy collapsing to degenerate sparse
# strategies, that is the cause (consider rm_distill, or a larger head init).
seed: 0
env:
  name: leduc
  reward_type: difference
algorithm:
  type: mmd
  loss_type: rm
  n_epochs: 1
  batch_size: 512
  optimizer:
    type: adam
    lr: 0.0003
  clip_eps: 0.1
  vf_coef: 0.5
  # Entropy regulariser (Shannon, masked to support) keeps the sparse RM strategy
  # from over-committing early — useful given the dead-gradient caveat above.
  ent_coef: 0.03
  gamma: 1.0
  gae_lambda: 1.0
  magnet_coef: 0.2
  old_policy_coef: 0.05
  regularize_value: true
  target_update_rate: 0.001
  magnet_interval: 2000
  agent:
    network:
      type: twin_head
      torso:
        type: mlp
        feature_dim: 128
        hidden:
        - 128
        - 128
        activation: gelu
        norm: rms
      head1:
        type: categorical
        n_actions: null
      head2:
        type: value
trainer:
  n_steps: 200000
  log_every: 2000
  checkpoint_every: 2000
  checkpoint_dir: private_experiments/rm_leduc
  save_metrics: true
