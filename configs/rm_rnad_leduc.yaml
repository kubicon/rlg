seed: 0
env:
  name: leduc
  reward_type: difference
algorithm:
  type: rm_rnad
  n_epochs: 1            # one regret accumulation per iteration (clean RM)
  batch_size: 64
  epsilon: 0.1           # ε-on-policy exploration floor for RM sampling
  optimizer:
    type: sgd            # momentum-free SGD → logits literally accumulate regret
    lr: 0.01             # main stability knob: scales the per-step regret update
                         # (shared with the critic; >~0.03 diverges the value head)
    momentum: 0.0
  clip_eps: 0.1
  vf_coef: 0.5
  ent_coef: 0.0          # RM's hard simplex handles support; no entropy bonus
  gamma: 1.0
  gae_lambda: 0.95
  delta_clip: 1.0
  trace_clip: 1.0
  target_update_rate: 0.001
  magnet_coef: 0.2
  magnet_interval: 2000
  regularize_value: true
  neurd_clip: 5.0
  agent:
    type: actor_critic
    network:
      type: twin_head
      torso:
        type: mlp
        feature_dim: 128
        hidden:
        - 128
        - 128
        activation: gelu   # set to rm_simplex to A/B the optional (D) trunk
        norm: rms
      head1:
        type: categorical  # output reinterpreted as cumulative regrets
        n_actions: null
      head2:
        type: value
trainer:
  n_steps: 40000
  log_every: 2000
  checkpoint_every: 2000
  checkpoint_dir: public_experiments/rm_rnad_leduc
  save_metrics: true
