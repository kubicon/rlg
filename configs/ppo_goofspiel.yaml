seed: 0

env:
  name: goofspiel
  n_cards: 5
  prize_order: descending  # random | ascending | descending
  reward_type: binary       # difference | binary

algorithm:
  type: ppo
  n_epochs: 4
  batch_size: 64
  lr: 3.0e-4
  clip_eps: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  gamma: 1.0
  gae_lambda: 0.95
  delta_clip: 1.0
  trace_clip: 1.0
  target_update_rate: 0.005

  agent:
    type: actor_critic
    network:
      type: twin_head
      torso:
        type: mlp
        feature_dim: 128
        hidden: [128, 128]
        activation: relu
      head1:
        type: categorical
        n_actions: ~         # null → filled from env.num_actions at runtime
      head2:
        type: value

trainer:
  n_steps: 1000
  log_every: 100
  checkpoint_every: 200
  checkpoint_dir: data/ppo_goofspiel
  save_metrics: false
