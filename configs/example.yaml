#   head:
#     type: gaussian
#     action_dim: 6
#     log_std_min: -5.0
#     log_std_max: 2.0


# ── SAC / TD3 twin critics — separate pathways ────────────────────────────
# type: separate_twin_head — two fully independent (torso, head) pairs.
# No shared parameters; each critic has its own backbone.
