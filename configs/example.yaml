# Example network configs for rlg.
# Load with:
#   import yaml
#   from rlg.networks.configs import parse_network_config, build_network
#
#   with open('configs/example.yaml') as f:
#       raw = yaml.safe_load(f)
#
#   cfg     = parse_network_config(raw['network'])
#   network = cfg.build()
#   params  = network.init_params(key, x)
#   state   = network.init_state(params)
#
# Uncomment exactly one 'network' block before loading.


# ── PPO / A2C — shared MLP backbone ───────────────────────────────────────
# type: twin_head — one torso, two independent heads (actor + critic here,
# but the same structure works for any task with two outputs).
network:
  type: twin_head
  torso:
    type: mlp
    feature_dim: 256
    hidden: [256, 256]
    activation: relu
  head1:
    type: categorical
    n_actions: 18
  head2:
    type: value


# ── SAC actor — Gaussian policy ────────────────────────────────────────────
# type: network — single torso + single head, the simplest case.
# network:
