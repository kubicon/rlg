seed: 0
env:
  name: leduc
  reward_type: difference
algorithm:
  type: mmd
  n_epochs: 1
  batch_size: 64
  optimizer:
    type: adam
    lr: 0.0003
  clip_eps: 0.1
  vf_coef: 0.5
  ent_coef: 0.03
  gamma: 1.0
  gae_lambda: 1.0
  magnet_coef: 0.2
  old_policy_coef: 0.05
  target_update_rate: 0.001
  magnet_interval: 2000
  # α-entmax policy. 1.0 = softmax, >1 = sparse. The static value below is the
  # converged α used at eval time; the schedule anneals it during training.
  alpha: 1.5
  # Anneal α from near-softmax (stable early learning) to the target sparsity.
  # Start at 1.05 rather than 1.0: a scheduled α always runs the entmax path
  # (it is traced, so the exact softmax fast-path can't fire), and the entmax
  # projection is numerically clean only for α ≳ 1.05.
  schedules:
    alpha:
      type: linear
      init_value: 1.05
      end_value: 1.5
      transition_steps: 20000
  agent:
    network:
      type: twin_head
      torso:
        type: mlp
        feature_dim: 128
        hidden:
        - 128
        - 128
        activation: gelu
        norm: rms
      head1:
        type: categorical
        n_actions: null
      head2:
        type: value
trainer:
  n_steps: 40000
  log_every: 2000
  checkpoint_every: 2000
  checkpoint_dir: public_experiments/entmax_leduc
  save_metrics: true
