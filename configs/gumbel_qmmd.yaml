seed: 0
env:
  name: leduc
  reward_type: difference
algorithm:
  type: gumbel_qmmd
  n_epochs: 1
  batch_size: 128
  optimizer:
    type: adamw
    weight_decay: 0.01
    lr: 0.0003
  clip_eps: 0.1
  vf_coef: 0.5
  ent_coef: 0.03
  gamma: 1.0
  magnet_coef: 0.2
  old_policy_coef: 0.05
  target_update_rate: 0.001
  magnet_interval: 2000
  gae_lambda: 0.98
  # Gumbel-Softmax temperature for the pathwise policy gradient.
  # Keep in ~[0.5, 2]; tau -> 0 explodes the gradient variance.
  gumbel_tau: 1.0
  agent:
    network:
      type: twin_head
      torso:
        type: mlp
        feature_dim: 128
        hidden:
        - 128
        - 128
        activation: gelu
        norm: rms
      head1:
        type: categorical
        n_actions: null
      head2:
        type: q
        n_actions: null
trainer:
  n_steps: 40000
  log_every: 2000
  checkpoint_every: 2000
  checkpoint_dir: private_experiments/gumbel_qmmd_leduc
  save_metrics: true
