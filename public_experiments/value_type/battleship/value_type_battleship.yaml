sweep:
  seed: [0, 1, 2, 3, 4]
  algorithm.loss_type: [mmd, rnad]

sweep_zip:
  algorithm:
  - type: qmmd
    n_epochs: 1
    batch_size: 64
    optimizer:
      type: adam
      lr: 0.0003
    clip_eps: 0.1
    vf_coef: 0.5
    ent_coef: 0.03
    gamma: 1.0
    magnet_coef: 0.2
    old_policy_coef: 0.05
    target_update_rate: 0.001
    magnet_interval: 2000
    gae_lambda: 1.0
    neurd_clip: 5.0
    neurd_threshold: 3.0
    agent:
      network:
        type: twin_head
        torso:
          type: mlp
          feature_dim: 128
          hidden: [128, 128]
          activation: gelu
          norm: rms
        head1:
          type: categorical
          n_actions: null
        head2:
          type: q
          n_actions: null
  - type: mmd
    n_epochs: 1
    batch_size: 64
    optimizer:
      type: adam
      lr: 0.0003
    clip_eps: 0.1
    vf_coef: 0.5
    ent_coef: 0.03
    gamma: 1.0
    gae_lambda: 1.0
    delta_clip: 1.0
    trace_clip: 1.0
    magnet_coef: 0.2
    old_policy_coef: 0.05
    target_update_rate: 0.001
    magnet_interval: 2000
    neurd_clip: 5.0
    neurd_threshold: 3.0
    agent:
      network:
        type: twin_head
        torso:
          type: mlp
          feature_dim: 128
          hidden: [128, 128]
          activation: gelu
          norm: rms
        head1:
          type: categorical
          n_actions: null
        head2:
          type: value

seed: 0
env:
  name: battleship
  board_size: 2
  ship_lengths:
  - 2
  reward_type: binary
algorithm:
  type: qmmd
  loss_type: mmd
trainer:
  n_steps: 100000
  log_every: 2000
  checkpoint_every: 2000
  checkpoint_dir: public_experiments/value_type/battleship
  save_metrics: true
