sweep:
  algorithm.loss_type: [rnad, mmd]
  seed: [0, 1, 2, 3, 4]

seed: 0
env:
  name: hex
  board_size: 3
  dark: true
  abrupt: true
algorithm:
  type: mmd
  n_epochs: 2
  batch_size: 1024
  optimizer:
    type: adam
    lr: 0.0001
  clip_eps: 0.1
  vf_coef: 0.5
  ent_coef: 0.03
  gamma: 1.0
  gae_lambda: 0.95
  delta_clip: 1.0
  trace_clip: 1.0
  target_update_rate: 0.001
  magnet_coef: 0.2
  old_policy_coef: 0.05
  magnet_interval: 20000
  loss_type: rnad
  neurd_clip: 5.0
  neurd_threshold: 3.0
  agent:
    type: actor_critic
    network:
      type: twin_head
      torso:
        type: mlp
        feature_dim: 512
        hidden:
        - 512
        - 512
        activation: gelu
        norm: rms
      head1:
        type: categorical
        n_actions: null
      head2:
        type: value
trainer:
  n_steps: 2000000
  log_every: 20000
  checkpoint_every: 20000
  checkpoint_dir: public_experiments/dark_games/abrupt_dark_hex
  save_metrics: true
