sweep:
  seed: [0, 1, 2, 3, 4]
  algorithm.loss_type: [mmd, rnad]
  algorithm.agent.network.torso.n_steps: [1, 2, 3, 4, 5, 7, 10]

seed: 0
env:
  name: goofspiel
  n_cards: 5
  prize_order: descending
  reward_type: binary
algorithm:
  type: mmd
  n_epochs: 1
  batch_size: 64
  optimizer:
    type: adamw
    lr: 0.0003
    weight_decay: 0.01
  clip_eps: 0.1
  vf_coef: 0.5
  ent_coef: 0.03
  gamma: 1.0
  gae_lambda: 0.95
  delta_clip: 1.0
  trace_clip: 1.0
  target_update_rate: 0.001
  magnet_coef: 0.2
  old_policy_coef: 0.05
  magnet_interval: 2000
  loss_type: mmd
  neurd_clip: 5.0
  neurd_threshold: 2.0
  alternating: false
  agent:
    type: actor_critic
    network:
      type: twin_head
      torso:
        type: thinking_gru
        feature_dim: 128
        hidden_dim: 128
        n_steps: 5
        n_layers: 1
      head1:
        type: categorical
        n_actions: null
      head2:
        type: value
trainer:
  n_steps: 400000
  log_every: 2000
  checkpoint_every: 2000
  checkpoint_dir: public_experiments/thinking_steps/goofspiel
  save_metrics: true
