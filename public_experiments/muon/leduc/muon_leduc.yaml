sweep:
  seed: [0, 1, 2, 3, 4]
  algorithm.optimizer.lr: [0.005, 0.01, 0.02, 0.05]
  algorithm.optimizer.weight_decay: [0.005, 0.01, 0.02]

seed: 0
env:
  name: leduc
  reward_type: difference
algorithm:
  type: mmd
  n_epochs: 1
  batch_size: 64
  lr: 0.0003
  clip_eps: 0.1
  vf_coef: 0.5
  ent_coef: 0.03
  gamma: 1.0
  gae_lambda: 0.95
  delta_clip: 1.0
  trace_clip: 1.0
  target_update_rate: 0.001
  magnet_coef: 0.2
  old_policy_coef: 0.05
  magnet_interval: 2000
  loss_type: mmd
  neurd_clip: 5.0
  neurd_threshold: 2.0
  optimizer:
    type: muon
    lr: 0.01
    weight_decay: 0.01
    adam_learning_rate: 3e-4
  agent:
    type: actor_critic
    network:
      type: twin_head
      torso:
        type: mlp
        feature_dim: 128
        hidden:
        - 128
        - 128
        activation: gelu
        norm: rms
      head1:
        type: categorical
        n_actions: null
      head2:
        type: value
trainer:
  n_steps: 200000
  log_every: 2000
  checkpoint_every: 2000
  checkpoint_dir: public_experiments/muon/leduc
  save_metrics: true
